apply plugin: 'com.android.application'

android {
    namespace "com.example.myinstallerhook"   // ⚠️ 必须加
    compileSdk 34

    defaultConfig {
        applicationId "com.example.myinstallerhook"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

repositories {
    flatDir { dirs 'libs' }
}

dependencies {
    implementation(name:'api-101.0.1', ext:'aar')
}
