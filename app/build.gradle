}
    id 'com.android.application'
}

android {
    namespace 'com.example.myinstallerhook'  // 不再用 AndroidManifest 中的 package
    compileSdk 36

    defaultConfig {
        applicationId "com.example.myinstallerhook"
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // 资源 AAR / APK 相关警告忽略
    buildFeatures {
        viewBinding true
    }
}

repositories {
    google()
    mavenCentral()
    flatDir {
        dirs 'libs'  // 你的 api-101.0.1.aar 放这里
    }
}

dependencies {
    // Xposed / LSPosed AAR
    implementation(name: 'api-101.0.1', ext: 'aar')

    // Android 基础库
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.10.1'
}
