plugins {
    id 'com.android.application' version '8.2.1'
}

android {
    compileSdk 34

    defaultConfig {
        applicationId "com.example.myinstallerhook"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation(name:'api-101.0.1', ext:'aar')
}
